<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tp-Grupo1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 12px; }
        .btn-primary { background-color: #0d6efd; border: none; border-radius: 8px; padding: 10px; font-weight: 600; }
        .form-control { border-radius: 8px; padding: 10px; }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Sistema de Turnos Online </span>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-white border-0 pt-4">
                        <h2 class="h4 text-center mb-0 fw-bold">Iniciar Sesión</h2>
                        <p class="text-center text-muted small mt-2">Ingresá tus credenciales para acceder</p>
                    </div>
                    <div class="card-body px-4 pb-4">
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-secondary">DNI / Usuario</label>
                                <input type="text" name="username" class="form-control" placeholder="Ingresá tu DNI" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label small fw-bold text-secondary">Contraseña</label>
                                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Entrar</button>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer bg-light border-0 py-3 text-center rounded-bottom">
                        <span class="small text-muted">¿No tenés cuenta? 
                            <a href="{% url 'registro_nuevo' %}" class="text-decoration-none fw-bold">Registrate acá</a>
                        </span>
                    </div>
                </div>
                <p class="text-center mt-4 text-muted small">© 2026 Tp-Grupo1 | Gestión Médica</p>
            </div>
        </div>
    </div>
</body>
</html>
