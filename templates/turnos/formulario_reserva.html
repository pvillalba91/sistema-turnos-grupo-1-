<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Reserva - Tp-Grupo1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h4 class="mb-0">Confirmar Turno</h4>
                    </div>
                    <div class="card-body">
                        <p>Estás reservando con el <b>Dr/a. {{ medico.first_name }} {{ medico.last_name }}</b></p>
                        <p>Horario seleccionado: <b>{{ nombre_dia }} de {{ horario.hora_inicio|time:"H:i" }} a {{ horario.hora_fin|time:"H:i" }} hs</b></p>
                        
                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Elegí la fecha específica:</label>
                                <input type="date" name="fecha_reserva" class="form-control" required>
                                <div class="form-text">Asegurate de que la fecha caiga un día <b>{{ nombre_dia }}</b>.</div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Confirmar Reserva</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
