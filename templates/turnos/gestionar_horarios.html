<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestionar Horarios - Tp-Grupo1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">Tp-Grupo1 | Gestión de Horarios</span>
            <a href="{% url 'panel_profesional' %}" class="btn btn-outline-light btn-sm">Volver al Panel</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-primary text-white"><b>Cargar Nuevo Horario</b></div>
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Día</label>
                                <select name="dia" class="form-select">
                                    <option value="0">Lunes</option>
                                    <option value="1">Martes</option>
                                    <option value="2">Miércoles</option>
                                    <option value="3">Jueves</option>
                                    <option value="4">Viernes</option>
                                    <option value="5">Sábado</option>
                                    <option value="6">Domingo</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Desde</label>
                                <input type="time" name="inicio" class="form-control" step="60" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Hasta</label>
                                <input type="time" name="fin" class="form-control" step="60" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Guardar</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-white"><b>Mis Horarios Cargados</b></div>
                    <div class="card-body">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Día</th>
                                    <th>Rango</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for h in horarios %}
                                <tr>
                                    <td>{{ h.get_dia_semana_display }}</td>
                                    <td>{{ h.hora_inicio|time:"H:i" }} - {{ h.hora_fin|time:"H:i" }}</td>
                                    <td><a href="{% url 'eliminar_horario' h.id %}" class="btn btn-danger btn-sm">Borrar</a></td>
                                </tr>
                                {% empty %}
                                <tr><td colspan="3" class="text-center text-muted">No hay horarios.</td></tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
